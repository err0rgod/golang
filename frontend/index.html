<!DOCTYPE html>
<html>
<body>

<textarea id="doc" rows="200" cols="200">Connecting...</textarea>

<script>
const ws = new WebSocket("ws://localhost:8080/ws");

ws.onopen = () => {
    console.log("Connected");
};

ws.onmessage = (event) => {
    document.getElementById("doc").textContent = event.data;
};

ws.onclose = () => {
    console.log("Disconnected");
};

ws.onerror = (err) => {
    console.log(err);
};
</script>

</body>
</html>
